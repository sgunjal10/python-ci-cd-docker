name: CD – Docker Release Pipeline

on:
  push:
    tags:
      - "v*.*.*"       # production:  v1.0.0, v2.1.3
      - "v*.*.*-*"     # staging:     v1.0.0-rc1, v1.2.0-test

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: python-ci-cd-docker
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io

jobs:

  # =========================================================
  # JOB 1 — BUILD ONCE, push a sha-pinned image to GHCR
  # Both staging and production re-use this exact image.
  # Building once guarantees staging and prod run the same
  # binary — no silent rebuild differences.
  # =========================================================
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    outputs:
      # Pass the immutable image digest to downstream jobs
      image-digest: ${{ steps.push.outputs.digest }}
      # Pass the sha tag so downstream jobs can pull it
      sha-tag: sha-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3    # required for GHA layer cache

      - name: Build and push sha-tagged image to GHCR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: final                        # use lean multi-stage final layer
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha                 # reuse cached layers from previous runs
          cache-to: type=gha,mode=max

      - name: Notify on build failure
        if: failure()
        run: |
          echo "::error::Image build failed for tag ${{ github.ref_name }}"
          echo "## Build Failure" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** Fix the Dockerfile or app error above, then re-push the tag." >> $GITHUB_STEP_SUMMARY

  # =========================================================
  # JOB 2 — STAGING (pre-release tags: -rc, -test, -beta …)
  # Re-tags the already-built sha image with the version tag.
  # Does NOT push :latest — staging never pollutes latest.
  # =========================================================
  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: contains(github.ref_name, '-')         # v1.0.0-rc1  ✓  |  v1.0.0  ✗
    runs-on: ubuntu-latest
    environment: staging                        # triggers environment protection rules

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pull the image built in job 1 by its sha tag
      - name: Pull sha-tagged image from GHCR
        run: |
          docker pull ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }}

      # Re-tag with version (e.g. v1.0.0-rc1) and push — no :latest
      - name: Tag and push to GHCR (staging)
        run: |
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Tag and push to Docker Hub (staging)
        run: |
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Notify on staging failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed for ${{ github.ref_name }}"
          echo "## Staging Failure" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA image:** \`${{ needs.build.outputs.sha-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback:** re-deploy previous tag from GHCR or Docker Hub." >> $GITHUB_STEP_SUMMARY

  # =========================================================
  # JOB 3 — PRODUCTION (final semantic tags only: v1.0.0)
  # Re-tags the same sha image with version tag + :latest.
  # Uses the identical image that was tested in staging —
  # no rebuild, guaranteed consistency.
  # =========================================================
  deploy-production:
    name: Deploy to Production
    needs: build
    if: "!contains(github.ref_name, '-')"      # v1.0.0  ✓  |  v1.0.0-rc1  ✗
    runs-on: ubuntu-latest
    environment: production                     # requires manual approval in GitHub UI

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Pull the exact same image built in job 1
      - name: Pull sha-tagged image from GHCR
        run: |
          docker pull ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }}

      # Push version tag + :latest to both registries
      - name: Tag and push to GHCR (production)
        run: |
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Tag and push to Docker Hub (production)
        run: |
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag \
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }} \
            ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Notify on production failure
        if: failure()
        run: |
          echo "::error::Production deploy failed for ${{ github.ref_name }}"
          echo "## Production Failure" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA image:** \`${{ needs.build.outputs.sha-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Rollback:** re-push the previous version tag to restore :latest." >> $GITHUB_STEP_SUMMARY