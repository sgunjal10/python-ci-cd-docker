name: CD – Release Docker Image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write   # required for GHCR

env:
  IMAGE_NAME: python-ci-cd-docker

jobs:
  release:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # -----------------------
      # Checkout
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # Login to GHCR
      # -----------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------
      # Login to Docker Hub
      # -----------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------
      # Build Docker image (tag once, push twice)
      # -----------------------
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${{ github.ref_name }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest .

      # -----------------------
      # Push to GHCR
      # -----------------------
      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:latest

      # -----------------------
      # Push to Docker Hub
      # -----------------------
      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest