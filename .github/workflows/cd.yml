name: CD – Docker Release Pipeline

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

env:
  IMAGE_NAME: python-ci-cd-docker
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io

jobs:

  # =========================================================
  # STAGING DEPLOYMENT (pre-release tags: -test, -rc, etc.)
  # =========================================================
  deploy-staging:
    name: Deploy to Staging
    if: contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Login to GHCR ----
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Login to Docker Hub ----
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---- Build & Push (tag only, no latest) ----
      - name: Build & Push Docker Image (Staging)
        run: |
          docker build \
            -t $GHCR_REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.ref_name }} \
            -t $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.ref_name }} .

          docker push $GHCR_REGISTRY/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.ref_name }}
          docker push $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.ref_name }}

  # =========================================================
  # PRODUCTION DEPLOYMENT (final semantic tags only)
  # =========================================================
  deploy-production:
    name: Deploy to Production
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Login to GHCR ----
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Login to Docker Hub ----
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---- Build Image ----
      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest \
            -t $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.ref_name }} \
            -t $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest .

      # ---- Push All Tags ----
      - name: Push Docker Images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest

          docker push $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.ref_name }}
          docker push $DOCKERHUB_REGISTRY/${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest