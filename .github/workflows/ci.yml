name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write   # required for GHCR push

env:
  IMAGE_NAME: python-ci-cd-docker

jobs:

  # -------------------------------
  #  1. Run tests on Ubuntu VM
  # -------------------------------
  vm-tests:
    name: Test on Ubuntu VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest on VM
        run: python -m pytest


  # -------------------------------
  # 2. Run tests inside Docker
  # -------------------------------
  docker-tests:
    name: Test inside Docker container
    runs-on: ubuntu-latest
    needs: vm-tests   # Only runs if VM tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:test .

      - name: Run pytest inside the container
        run: docker run --rm $IMAGE_NAME:test

  # ---------------------------------------------------------
  # 3. Build & push Docker image to GitHub Container Registry
  # ---------------------------------------------------------
  docker-push:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    needs: docker-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
              -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest \
              -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ github.sha }}

  # ---------------------------------------------------------
  # 4. Build & push Docker image to Docker Hub
  # ---------------------------------------------------------
  dockerhub-push:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and tag image
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }} .

      # Push both tags
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ github.sha }}