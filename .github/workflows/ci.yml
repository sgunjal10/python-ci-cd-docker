name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:

  # ── Job 1: Run tests on a Linux VM ──────────────────────────────────────────
  vm-tests:
    name: VM Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]   # matrix testing: two Python versions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'                       # cache pip installs between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install coverage tools
        run: pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false           # don't break CI if Codecov is down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Job 2: Run tests inside Docker container ─────────────────────────────────
  docker-tests:
    name: Docker Tests
    runs-on: ubuntu-latest
    needs: vm-tests                         # only runs if VM tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (multi-stage)
        run: docker build --target final -t ci-cd-demo:test .

      - name: Run tests inside container
        run: docker run --rm ci-cd-demo:test

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Docker tests failed on commit ${{ github.sha }}"
          echo "## Docker Test Failure" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY