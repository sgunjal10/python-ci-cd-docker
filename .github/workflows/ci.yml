name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write   # required for GHCR push

env:
  IMAGE_NAME: python-ci-cd-docker

jobs:

  # -------------------------------
  #  1. Run tests on Ubuntu VM
  # -------------------------------
  vm-tests:
    name: Test on Ubuntu VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest on VM
        run: python -m pytest


  # -------------------------------
  # 2. Run tests inside Docker
  # -------------------------------
  docker-tests:
    name: Test inside Docker container
    runs-on: ubuntu-latest
    needs: vm-tests   # Only runs if VM tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:test .

      - name: Run pytest inside the container
        run: docker run --rm $IMAGE_NAME:test